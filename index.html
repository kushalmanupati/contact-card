<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0e17" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Circles" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Circles — Keep in Touch</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0f0e17;
      --surface:  #1a1828;
      --card:     #22203a;
      --border:   rgba(255,255,255,0.07);
      --text:     #f0eeff;
      --muted:    rgba(240,238,255,0.45);
      --faint:    rgba(240,238,255,0.10);
      --cyan:     #00d4ff;
      --lime:     #aaff5c;
      --orange:   #ff7b35;
      --violet:   #b57bff;
      --pink:     #ff5fa0;
      --yellow:   #ffd166;
      --teal:     #06d6a0;
      --red:      #ff4757;
      --shadow:   0 4px 20px rgba(0,0,0,0.3);
      --shadow-lg:0 12px 40px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── TOP NAV ─── */
    .top-nav {
      background: rgba(15,14,23,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-logo {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--cyan) 0%, var(--violet) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .app-tagline {
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1.8px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    /* ─── PROFILE CHIP ─── */
    .profile-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(181,123,255,0.1);
      border: 1px solid rgba(181,123,255,0.22);
      border-radius: 30px;
      padding: 6px 12px 6px 8px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      max-width: 160px;
    }
    .profile-chip:hover { background: rgba(181,123,255,0.17); border-color: rgba(181,123,255,0.35); }
    .profile-chip:active { transform: scale(0.96); }

    .profile-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 800;
      color: var(--bg);
      flex-shrink: 0;
    }

    .profile-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--violet);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-edit-icon {
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* ─── FAB ─── */
    .fab {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      right: 20px;
      width: 58px; height: 58px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      color: var(--bg);
      border: none;
      cursor: pointer;
      font-size: 30px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 300;
      z-index: 90;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(0,212,255,0.45), 0 2px 8px rgba(0,0,0,0.4);
    }
    .fab:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 8px 32px rgba(0,212,255,0.6); }
    .fab:active { transform: scale(0.93); }

    /* ─── MAIN ─── */
    .main {
      padding: 18px 15px 100px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ─── PROGRESS BARS ─── */
    .pb-strip { margin-bottom: 10px; }

    .pb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .pb-label {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .met-bar .pb-label  { color: var(--teal); }
    .missed-bar .pb-label { color: var(--orange); }

    .pb-dot { width: 7px; height: 7px; border-radius: 50%; }
    .met-bar .pb-dot    { background: var(--teal);   box-shadow: 0 0 8px var(--teal); }
    .missed-bar .pb-dot { background: var(--orange); box-shadow: 0 0 8px var(--orange); }

    .pb-nums {
      font-family: 'Syne', sans-serif;
      font-size: 16px; font-weight: 800;
    }
    .met-bar .pb-nums    { color: var(--teal); }
    .missed-bar .pb-nums { color: var(--orange); }
    .pb-nums .of-total   { font-size: 12px; font-weight: 500; color: var(--muted); }

    .pb-track { height: 7px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
    .pb-fill {
      height: 100%; border-radius: 4px; width: 0%;
      transition: width 1.1s cubic-bezier(0.34,1.2,0.64,1);
      position: relative; overflow: hidden;
    }
    .met-bar .pb-fill    { background: linear-gradient(90deg, var(--teal), var(--cyan)); box-shadow: 0 0 10px rgba(6,214,160,0.5); }
    .missed-bar .pb-fill { background: linear-gradient(90deg, var(--red), var(--orange)); box-shadow: 0 0 10px rgba(255,71,87,0.5); }
    .pb-fill::after {
      content: ''; position: absolute;
      top: 0; left: -60px; width: 50px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      animation: shim 2.5s ease-in-out infinite;
    }
    @keyframes shim { 0% { left:-60px; } 100% { left:110%; } }

    /* ─── DASHBOARD ─── */
    .dashboard {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; margin-bottom: 10px;
    }

    .stat-card {
      border-radius: 18px; padding: 14px 10px 12px;
      text-align: center; border: 1px solid transparent;
      transition: transform 0.2s;
    }
    .stat-card:active { transform: scale(0.97); }
    .stat-card.planned-past   { background: linear-gradient(150deg, rgba(255,95,160,0.18) 0%, rgba(181,123,255,0.08) 100%); border-color: rgba(255,95,160,0.2); }
    .stat-card.met-past       { background: linear-gradient(150deg, rgba(170,255,92,0.16) 0%, rgba(6,214,160,0.07) 100%);  border-color: rgba(170,255,92,0.2); }
    .stat-card.planned-future { background: linear-gradient(150deg, rgba(0,212,255,0.16) 0%, rgba(181,123,255,0.07) 100%); border-color: rgba(0,212,255,0.2); }

    .stat-value {
      font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800;
      line-height: 1; margin-bottom: 5px;
    }
    .planned-past .stat-value   { color: var(--pink); }
    .met-past .stat-value       { color: var(--lime); }
    .planned-future .stat-value { color: var(--cyan); }

    .stat-label {
      font-size: 10px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.3px; line-height: 1.35;
    }

    /* ─── SECTION LABELS ─── */
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    .section-label::after { content:''; flex:1; height:1px; background: var(--border); }

    /* ─── NEXT UP CARD ─── */
    .next-up-card {
      border-radius: 22px; padding: 22px 20px; margin-bottom: 22px;
      position: relative; overflow: hidden; animation: fadeUp 0.4s ease;
      background: linear-gradient(140deg, #1e1c38 0%, #28204a 100%);
      border: 1px solid rgba(181,123,255,0.2);
      box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .blob { position: absolute; border-radius: 50%; pointer-events: none; }
    .blob1 { top:-50px; right:-50px; width:150px; height:150px; background: radial-gradient(circle, rgba(181,123,255,0.25) 0%, transparent 70%); }
    .blob2 { bottom:-40px; left:-40px; width:120px; height:120px; background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%); }

    .next-up-card .empty-state { color: var(--muted); font-size: 14px; text-align: center; padding: 10px 0; position: relative; z-index:1; }

    .card-row { display:flex; align-items:flex-start; gap:14px; position:relative; z-index:1; }
    .card-avatar {
      width:58px; height:58px; border-radius:18px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; font-size:22px; font-weight:800;
      color:#fff; flex-shrink:0; box-shadow:0 4px 16px rgba(0,0,0,0.3);
    }
    .card-info { flex:1; }
    .card-name { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; color:var(--text); margin-bottom:4px; }
    .card-due  { font-size:12px; font-weight:600; color:var(--violet); margin-bottom:5px; }
    .card-due.overdue { color:var(--red); }
    .card-phone-txt { font-size:12px; color:var(--muted); }

    .card-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:16px; position:relative; z-index:1; }
    .action-btn {
      display:flex; align-items:center; gap:5px;
      padding:9px 16px; border-radius:30px; border:none;
      font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:700;
      cursor:pointer; text-decoration:none;
      transition:transform 0.15s, box-shadow 0.15s;
    }
    .action-btn:hover  { transform:translateY(-2px); }
    .action-btn:active { transform:scale(0.96); }
    .btn-met  { background:linear-gradient(135deg, var(--teal), var(--cyan)); color:var(--bg); box-shadow:0 4px 16px rgba(6,214,160,0.4); }
    .btn-call { background:rgba(255,255,255,0.08); color:var(--text); border:1px solid rgba(255,255,255,0.12); }
    .btn-li   { background:rgba(0,212,255,0.12); color:var(--cyan); border:1px solid rgba(0,212,255,0.18); }

    /* ─── CONTACT LIST ─── */
    .contacts-list { display:flex; flex-direction:column; gap:8px; }

    .contact-item {
      background: var(--card);
      border-radius: 16px;
      padding: 13px 15px;
      display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
      border: 1px solid var(--border);
      animation: fadeUp 0.3s ease;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .contact-item:hover  { transform:translateY(-1px); border-color:rgba(181,123,255,0.25); box-shadow:var(--shadow); }
    .contact-item:active { transform:scale(0.99); }
    .contact-item.overdue { background:rgba(255,71,87,0.07); border-color:rgba(255,71,87,0.25); }
    .contact-item.met     { opacity:0.45; }

    .list-avatar {
      width:46px; height:46px; border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; font-size:16px; font-weight:800;
      color:#fff; flex-shrink:0;
    }
    .list-info { flex:1; min-width:0; }
    .list-name { font-weight:700; font-size:15px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .list-name.met-strike { text-decoration:line-through; }
    .list-sub  { font-size:12px; color:var(--muted); margin-top:2px; }
    .list-date { text-align:right; flex-shrink:0; }

    .date-badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; }
    .date-badge.overdue  { background:rgba(255,71,87,0.14);  color:var(--red); }
    .date-badge.soon     { background:rgba(255,209,102,0.14); color:var(--yellow); }
    .date-badge.upcoming { background:rgba(0,212,255,0.11);   color:var(--cyan); }
    .date-badge.met      { background:rgba(6,214,160,0.11);   color:var(--teal); }

    .days-label { font-size:10px; color:var(--muted); margin-top:3px; display:block; text-align:right; }

    /* ─── ITEM QUICK ACTIONS ─── */
    .item-actions {
      display: flex; gap: 6px; width: 100%;
      padding-top: 8px; border-top: 1px solid var(--border);
      margin-top: -4px; animation: fadeUp 0.2s ease;
    }
    .item-act-btn {
      flex:1; padding:8px 4px; border-radius:10px; border:none;
      font-family:'Plus Jakarta Sans',sans-serif; font-size:11px; font-weight:700;
      cursor:pointer; transition:opacity 0.15s, transform 0.15s;
    }
    .item-act-btn:active { transform:scale(0.97); }
    .iab-later  { background:rgba(181,123,255,0.12); color:var(--violet); }
    .iab-cancel { background:rgba(255,71,87,0.12);   color:var(--red); }
    .iab-edit   { background:rgba(255,255,255,0.06); color:var(--muted); }

    .divider-label {
      font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
      color:var(--muted); margin:16px 0 8px;
      display:flex; align-items:center; gap:8px;
    }
    .divider-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ─── EMPTY ─── */
    .empty-full { text-align:center; padding:40px 20px; color:var(--muted); }
    .empty-full .emoji { font-size:44px; margin-bottom:12px; display:block; }
    .empty-full p { font-size:14px; line-height:1.7; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position:fixed; inset:0;
      background:rgba(8,7,18,0.8);
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      z-index:200; display:flex; align-items:flex-end; justify-content:center;
      animation:fadeIn 0.2s ease;
    }
    .modal {
      background:var(--surface); border-radius:28px 28px 0 0;
      padding:24px 20px 44px; width:100%; max-width:480px;
      animation:slideUp 0.3s cubic-bezier(0.34,1.15,0.64,1);
      max-height:90vh; overflow-y:auto;
      border-top:1px solid rgba(255,255,255,0.07);
    }
    .modal-handle { width:36px; height:4px; background:rgba(255,255,255,0.15); border-radius:2px; margin:0 auto 22px; }
    .modal-title  { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; color:var(--text); margin-bottom:18px; }

    .form-group   { margin-bottom:14px; }
    .form-label   { display:block; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    .form-input   {
      width:100%; padding:13px 15px;
      background:var(--card); border:1.5px solid var(--border);
      border-radius:13px; font-family:'Plus Jakarta Sans',sans-serif; font-size:16px; color:var(--text);
      outline:none; transition:border-color 0.2s, box-shadow 0.2s;
      -webkit-user-select: text;
      user-select: text;
      touch-action: manipulation;
    }
    .form-input:focus { border-color:var(--violet); box-shadow:0 0 0 3px rgba(181,123,255,0.15); }
    .form-input::placeholder { color:rgba(240,238,255,0.2); }
    .form-input[type="date"] { color-scheme:dark; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    .modal-footer { display:flex; gap:10px; margin-top:18px; }
    .btn-cancel {
      flex:1; padding:14px; border:1.5px solid var(--border); background:transparent;
      border-radius:14px; font-family:'Plus Jakarta Sans',sans-serif; font-size:15px;
      font-weight:700; color:var(--muted); cursor:pointer;
    }
    .btn-save {
      flex:2; padding:14px;
      background:linear-gradient(135deg, var(--violet), var(--cyan));
      border:none; border-radius:14px; font-family:'Plus Jakarta Sans',sans-serif;
      font-size:15px; font-weight:700; color:var(--bg); cursor:pointer;
      box-shadow:0 4px 18px rgba(181,123,255,0.4); transition:opacity 0.2s;
    }
    .btn-save:hover { opacity:0.9; }
    .btn-delete {
      width:100%; padding:12px;
      background:rgba(255,71,87,0.08); border:1.5px solid rgba(255,71,87,0.18);
      border-radius:14px; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px;
      font-weight:700; color:var(--red); cursor:pointer; margin-top:10px;
    }
    .readonly-banner {
      background:rgba(6,214,160,0.1); border:1px solid rgba(6,214,160,0.2);
      border-radius:12px; padding:10px 14px; font-size:12px; color:var(--teal);
      margin-bottom:16px; text-align:center; font-weight:700;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeIn  { from{opacity:0}               to{opacity:1} }
    @keyframes slideUp { from{transform:translateY(50px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

<nav class="top-nav">
  <div>
    <div class="app-logo">Circles</div>
    <div class="app-tagline">Keep in touch</div>
  </div>
  <button class="profile-chip" id="profileChip" onclick="openProfileEdit()">
    <div class="profile-avatar" id="profileAvatar">?</div>
    <div class="profile-name" id="profileNameLabel">Set name</div>
    <div class="profile-edit-icon">✎</div>
  </button>
</nav>

<div class="main" id="mainContent"></div>

<button class="fab" id="addBtn">＋</button>

<!-- PERMANENT ADD FORM — inputs always in DOM so iOS keyboard works -->
<div class="modal-overlay" id="addFormOverlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Contact</div>
    <div class="form-group">
      <label class="form-label">Name *</label>
      <input class="form-input" id="fi-name" type="text" inputmode="text" placeholder="Full name"
        autocomplete="name" autocorrect="off" autocapitalize="words" spellcheck="false" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="fi-phone" type="tel" inputmode="tel" placeholder="+1 555 000" autocomplete="tel" />
      </div>
      <div class="form-group">
        <label class="form-label">Meet by *</label>
        <input class="form-input" id="fi-date" type="date" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">LinkedIn URL</label>
      <input class="form-input" id="fi-li" type="url" inputmode="url" placeholder="https://linkedin.com/in/..."
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="document.getElementById('addFormOverlay').style.display='none'">Cancel</button>
      <button class="btn-save" onclick="saveContact()">Save Contact</button>
    </div>
  </div>
</div>

<!-- PERMANENT EDIT FORM — inputs always in DOM so iOS keyboard works -->
<div class="modal-overlay" id="editFormOverlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Contact</div>
    <input type="hidden" id="ei-id" />
    <div class="form-group">
      <label class="form-label">Name *</label>
      <input class="form-input" id="ei-name" type="text" inputmode="text" placeholder="Full name"
        autocomplete="name" autocorrect="off" autocapitalize="words" spellcheck="false" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-input" id="ei-phone" type="tel" inputmode="tel" placeholder="+1 555 000" autocomplete="tel" />
      </div>
      <div class="form-group">
        <label class="form-label">Meet by *</label>
        <input class="form-input" id="ei-date" type="date" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">LinkedIn URL</label>
      <input class="form-input" id="ei-li" type="url" inputmode="url" placeholder="https://linkedin.com/in/..."
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="document.getElementById('editFormOverlay').style.display='none'">Cancel</button>
      <button class="btn-save" onclick="updateContact()">Update</button>
    </div>
    <button class="btn-delete" style="background:rgba(6,214,160,0.08);border-color:rgba(6,214,160,0.2);color:var(--teal);margin-top:10px;"
      onclick="const id=document.getElementById('ei-id').value;markMet(id);document.getElementById('editFormOverlay').style.display='none';">✓ Mark as Met</button>
    <button class="btn-delete" onclick="deleteContact()">🗑 Remove Contact</button>
  </div>
</div>

<!-- DYNAMIC MODAL for met-contact view only (no inputs needed) -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalBox">
    <div class="modal-handle"></div>
    <div id="modalInner"></div>
  </div>
</div>

<!-- PERMANENT RESCHEDULE FORM -->
<div class="modal-overlay" id="rsFormOverlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Reschedule</div>
    <input type="hidden" id="rs-id" />
    <div class="form-group">
      <label class="form-label">New Meet-by Date *</label>
      <input class="form-input" id="rs-date" type="date" />
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;">
      <button onclick="shiftDays('rs-date',7)"  style="flex:1;padding:8px 4px;background:rgba(181,123,255,0.1);border:1px solid rgba(181,123,255,0.2);border-radius:10px;color:var(--violet);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">+1 week</button>
      <button onclick="shiftDays('rs-date',14)" style="flex:1;padding:8px 4px;background:rgba(181,123,255,0.1);border:1px solid rgba(181,123,255,0.2);border-radius:10px;color:var(--violet);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">+2 weeks</button>
      <button onclick="shiftDays('rs-date',30)" style="flex:1;padding:8px 4px;background:rgba(181,123,255,0.1);border:1px solid rgba(181,123,255,0.2);border-radius:10px;color:var(--violet);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">+1 month</button>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="document.getElementById('rsFormOverlay').style.display='none'">Cancel</button>
      <button class="btn-save" onclick="saveReschedule()">Reschedule</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const STORE_KEY = 'circles_v3';
let state = { profileName: '', contacts: [] };

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function load() {
  try {
    // Migrate from old v2 format if present
    const old = localStorage.getItem('circles_v2');
    if (old) {
      const o = JSON.parse(old);
      // Pick whichever user had more contacts
      const ku = o.kushal || [], es = o.esha || [];
      state.contacts = ku.length >= es.length ? ku : es;
      state.profileName = '';
      save();
      localStorage.removeItem('circles_v2');
      return;
    }
    const d = localStorage.getItem(STORE_KEY);
    if (d) state = JSON.parse(d);
  } catch(e) {}
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function initials(n) { return (n||'?').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2) || '?'; }

const GRADS = [
  'linear-gradient(135deg,#b57bff,#00d4ff)',
  'linear-gradient(135deg,#ff5fa0,#ff7b35)',
  'linear-gradient(135deg,#aaff5c,#06d6a0)',
  'linear-gradient(135deg,#00d4ff,#06d6a0)',
  'linear-gradient(135deg,#ffd166,#ff7b35)',
  'linear-gradient(135deg,#b57bff,#ff5fa0)',
];
function colorFor(n) {
  let h=0; for(const c of (n||'')) h=(h*31+c.charCodeAt(0))&0xffff;
  return GRADS[h % GRADS.length];
}

function daysDiff(ds) {
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(ds); d.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
function fmt(ds) { return new Date(ds).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function daysLabel(diff) {
  if(diff===0) return 'Today';
  if(diff===1) return 'Tomorrow';
  if(diff===-1) return 'Yesterday';
  if(diff<0) return `${-diff}d overdue`;
  return `in ${diff}d`;
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function esc(s) {
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── PROFILE ──────────────────────────────────────────────────────────────────
function updateProfileChip() {
  const name = state.profileName || '';
  const label = document.getElementById('profileNameLabel');
  const avatar = document.getElementById('profileAvatar');
  if (label) label.textContent = name || 'Set name';
  if (avatar) avatar.textContent = name ? initials(name) : '?';
}

function openProfileEdit() {
  // Use native prompt — guaranteed to trigger iOS keyboard in PWA standalone mode
  const current = state.profileName || '';
  const v = prompt('Enter your name:', current);
  if (v === null) return; // cancelled
  state.profileName = v.trim();
  save(); updateProfileChip();
}

function saveProfileName() {
  const v = document.getElementById('pn-input') ? document.getElementById('pn-input').value.trim() : '';
  state.profileName = v;
  save(); updateProfileChip();
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function computeStats() {
  const contacts = state.contacts;
  const today=new Date(); today.setHours(0,0,0,0);
  const ms30=30*86400000, ms60=60*86400000;
  let plannedLast30=0, metLast30=0, plannedNext60=0;
  let totalMet=0, totalMissed=0, total=0;

  for(const c of contacts) {
    if(!c.dueDate) continue;
    total++;
    const due=new Date(c.dueDate); due.setHours(0,0,0,0);
    const diff=due-today;
    if(diff>=-ms30 && diff<=0) plannedLast30++;
    if(diff>0 && diff<=ms60)   plannedNext60++;
    if(c.met) {
      totalMet++;
      const md=new Date(c.metDate); md.setHours(0,0,0,0);
      if(today-md >= 0 && today-md <= ms30) metLast30++;
    } else if(diff<0) {
      totalMissed++;
    }
  }
  return {plannedLast30, metLast30, plannedNext60, totalMet, totalMissed, total};
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  updateProfileChip();
  const contacts = state.contacts;
  const s = computeStats();
  const active = contacts.filter(c=>!c.met).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));
  const met    = contacts.filter(c=> c.met).sort((a,b)=>new Date(b.metDate)-new Date(a.metDate));

  const metPct    = s.total>0 ? Math.round(s.totalMet/s.total*100) : 0;
  const missedPct = s.total>0 ? Math.round(s.totalMissed/s.total*100) : 0;

  let html = '';

  // ── Progress bar: Met ──
  html += `<div class="pb-strip met-bar">
    <div class="pb-header">
      <div class="pb-label"><span class="pb-dot"></span>People Met Overall</div>
      <div class="pb-nums">${s.totalMet} <span class="of-total">/ ${s.total}</span></div>
    </div>
    <div class="pb-track"><div class="pb-fill" id="metFill"></div></div>
  </div>`;

  // ── Dashboard ──
  html += `<div class="dashboard">
    <div class="stat-card planned-past">
      <div class="stat-value">${s.plannedLast30}</div>
      <div class="stat-label">Planned<br>last 30d</div>
    </div>
    <div class="stat-card met-past">
      <div class="stat-value">${s.metLast30}</div>
      <div class="stat-label">Met<br>last 30d</div>
    </div>
    <div class="stat-card planned-future">
      <div class="stat-value">${s.plannedNext60}</div>
      <div class="stat-label">Planned<br>next 60d</div>
    </div>
  </div>`;

  // ── Progress bar: Missed ──
  html += `<div class="pb-strip missed-bar">
    <div class="pb-header">
      <div class="pb-label"><span class="pb-dot"></span>Missed Meetings</div>
      <div class="pb-nums">${s.totalMissed} <span class="of-total">/ ${s.total}</span></div>
    </div>
    <div class="pb-track"><div class="pb-fill" id="missedFill"></div></div>
  </div>`;

  // ── Next Up ──
  html += `<div class="section-label" style="margin-top:18px">Next Up</div>`;
  if(active.length===0) {
    html += `<div class="next-up-card"><div class="blob blob1"></div><div class="blob blob2"></div>
      <div class="empty-state">No upcoming meetings — tap ＋ to add someone!</div></div>`;
  } else {
    const c = active[0];
    const diff = daysDiff(c.dueDate);
    const oc = diff<0 ? 'overdue' : '';
    const dl = diff<0 ? `⚠️ ${-diff} days overdue`
             : diff===0 ? '🔥 Due Today!'
             : diff<=3  ? `⚡ Due ${fmt(c.dueDate)}`
             :             `📅 Due ${fmt(c.dueDate)}`;
    html += `<div class="next-up-card">
      <div class="blob blob1"></div><div class="blob blob2"></div>
      <div class="card-row">
        <div class="card-avatar" style="background:${colorFor(c.name)}">${initials(c.name)}</div>
        <div class="card-info">
          <div class="card-name">${esc(c.name)}</div>
          <div class="card-due ${oc}">${dl}</div>
          ${c.phone ? `<div class="card-phone-txt">${esc(c.phone)}</div>` : ''}
        </div>
      </div>
      <div class="card-actions">
        <button class="action-btn btn-met" onclick="markMet('${c.id}')">✓ Mark as Met</button>
        ${c.phone    ? `<a class="action-btn btn-call" href="tel:${esc(c.phone)}">📞 Call</a>` : ''}
        ${c.linkedin ? `<a class="action-btn btn-li" href="${esc(c.linkedin)}" target="_blank">💼 LinkedIn</a>` : ''}
      </div>
    </div>`;
  }

  // ── All Contacts list ──
  html += `<div class="section-label">All Contacts</div>`;
  if(contacts.length===0) {
    html += `<div class="empty-full"><span class="emoji">👋</span>
      <p>Add the people you want to stay in touch with.<br>Tap <strong>＋</strong> to get started.</p></div>`;
  } else {
    html += `<div class="contacts-list">`;
    for(const c of active) html += itemHtml(c);
    if(met.length>0) {
      html += `<div class="divider-label">✓ Met</div>`;
      for(const c of met) html += itemHtml(c);
    }
    html += `</div>`;
  }

  document.getElementById('mainContent').innerHTML = html;

  // Animate progress bars
  requestAnimationFrame(() => setTimeout(() => {
    const mf = document.getElementById('metFill');
    const xf = document.getElementById('missedFill');
    if(mf) mf.style.width = metPct + '%';
    if(xf) xf.style.width = missedPct + '%';
  }, 100));
}

function itemHtml(c) {
  const diff = c.met ? null : daysDiff(c.dueDate);
  const over = !c.met && diff<0;
  const soon = !c.met && diff!==null && diff>=0 && diff<=7;
  const bc   = c.met ? 'met' : over ? 'overdue' : soon ? 'soon' : 'upcoming';
  const bt   = c.met ? '✓ Met' : fmt(c.dueDate);
  const dl   = c.met ? (c.metDate ? `met ${fmt(c.metDate)}` : '') : daysLabel(diff);

  const clickHandler = c.met ? `openDetail('${c.id}')` : `toggleActions('${c.id}')`;
  const actionsRow = c.met ? '' : `
    <div class="item-actions" id="actions-${c.id}" style="display:none">
      <button class="item-act-btn iab-later"  onclick="openReschedule('${c.id}');event.stopPropagation()">↪ Reschedule</button>
      <button class="item-act-btn iab-cancel" onclick="cancelMeeting('${c.id}');event.stopPropagation()">✕ Cancel</button>
      <button class="item-act-btn iab-edit"   onclick="openDetail('${c.id}');event.stopPropagation()">✎ Edit</button>
    </div>`;

  return `<div class="contact-item${over?' overdue':''}${c.met?' met':''}" id="item-${c.id}" onclick="${clickHandler}">
    <div class="list-avatar" style="background:${colorFor(c.name)}">${initials(c.name)}</div>
    <div class="list-info">
      <div class="list-name${c.met?' met-strike':''}">${esc(c.name)}</div>
      <div class="list-sub">${c.phone ? esc(c.phone) : '&nbsp;'}</div>
    </div>
    <div class="list-date">
      <span class="date-badge ${bc}">${bt}</span>
      <span class="days-label">${dl}</span>
    </div>
    ${actionsRow}
  </div>`;
}

// ─── MARK MET ─────────────────────────────────────────────────────────────────
function markMet(id) {
  const c = state.contacts.find(x=>x.id===id);
  if(!c) return;
  c.met=true; c.metDate=new Date().toISOString().split('T')[0];
  save(); render();
}

// ─── TOGGLE ACTIONS ───────────────────────────────────────────────────────────
let expandedId = null;
function toggleActions(id) {
  if(expandedId && expandedId!==id) {
    const prev = document.getElementById('actions-'+expandedId);
    if(prev) prev.style.display='none';
  }
  const el = document.getElementById('actions-'+id);
  if(!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'flex';
  expandedId = isOpen ? null : id;
}

// ─── CANCEL ───────────────────────────────────────────────────────────────────
function cancelMeeting(id) {
  if(!confirm('Remove this meeting from your list?')) return;
  state.contacts = state.contacts.filter(x=>x.id!==id);
  save(); expandedId=null; render();
}

// ─── RESCHEDULE ───────────────────────────────────────────────────────────────
function openReschedule(id) {
  const c = state.contacts.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('rs-id').value   = id;
  document.getElementById('rs-date').value = c.dueDate || '';
  document.getElementById('rs-date').min   = new Date().toISOString().split('T')[0];
  document.getElementById('rsFormOverlay').style.display = 'flex';
}

function shiftDays(inputId, days) {
  const el = document.getElementById(inputId);
  if(!el) return;
  const base = el.value ? new Date(el.value) : new Date();
  base.setDate(base.getDate()+days);
  el.value = base.toISOString().split('T')[0];
}

function saveReschedule(id) {
  if(!id) id = document.getElementById('rs-id').value;
  const c = state.contacts.find(x=>x.id===id);
  if(!c) return;
  const date = document.getElementById('rs-date').value;
  if(!date) { alert('Please pick a date'); return; }
  c.dueDate = date;
  save(); expandedId=null;
  document.getElementById('rsFormOverlay').style.display='none';
  render();
}

// ─── MODAL HELPERS ────────────────────────────────────────────────────────────
function openModal(html) {
  const inner = document.getElementById('modalInner');
  const overlay = document.getElementById('modalOverlay');
  inner.innerHTML = html;
  overlay.style.display = 'flex';
  // Do NOT auto-focus — let user tap the field they want.
  // iOS PWA will show keyboard on explicit user tap.
}
function closeModal() { document.getElementById('modalOverlay').style.display='none'; }
function handleOverlayClick(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }

// ─── ADD ──────────────────────────────────────────────────────────────────────
document.getElementById('addBtn').onclick = function() {
  // Clear fields
  document.getElementById('fi-name').value = '';
  document.getElementById('fi-phone').value = '';
  document.getElementById('fi-date').value = '';
  document.getElementById('fi-li').value = '';
  document.getElementById('fi-date').min = new Date().toISOString().split('T')[0];
  document.getElementById('addFormOverlay').style.display = 'flex';
};

function saveContact() {
  const name  = document.getElementById('fi-name').value.trim();
  const phone = document.getElementById('fi-phone').value.trim();
  const date  = document.getElementById('fi-date').value;
  const li    = document.getElementById('fi-li').value.trim();
  if(!name) { alert('Name is required'); return; }
  if(!date) { alert('Meet by date is required'); return; }
  state.contacts.push({ id:uid(), name, phone, dueDate:date, linkedin:li, met:false, metDate:null, createdAt:Date.now() });
  save();
  document.getElementById('addFormOverlay').style.display = 'none';
  render();
}

// ─── DETAIL / EDIT ────────────────────────────────────────────────────────────
function openDetail(id) {
  const c = state.contacts.find(x=>x.id===id);
  if(!c) return;
  if(c.met) {
    openModal(`
      <div class="modal-title">${esc(c.name)}</div>
      <div class="readonly-banner">✅ Met on ${fmt(c.metDate)}</div>
      ${c.phone    ? `<div class="form-group"><label class="form-label">Phone</label><div style="padding:8px 0;font-size:15px;">${esc(c.phone)}</div></div>` : ''}
      ${c.linkedin ? `<div class="form-group"><label class="form-label">LinkedIn</label><a href="${esc(c.linkedin)}" target="_blank" style="color:var(--cyan);font-size:13px;">View Profile →</a></div>` : ''}
      <div class="form-group"><label class="form-label">Was Due</label><div style="padding:8px 0;font-size:15px;">${fmt(c.dueDate)}</div></div>
      <div class="modal-footer"><button class="btn-cancel" style="flex:1" onclick="closeModal()">Close</button></div>
      <button class="btn-delete" onclick="deleteContact('${id}')">🗑 Remove Contact</button>
    `);
    return;
  }
  // Populate the permanent edit form
  document.getElementById('ei-id').value   = id;
  document.getElementById('ei-name').value = c.name || '';
  document.getElementById('ei-phone').value= c.phone || '';
  document.getElementById('ei-date').value = c.dueDate || '';
  document.getElementById('ei-li').value   = c.linkedin || '';
  document.getElementById('ei-date').min   = '';
  document.getElementById('editFormOverlay').style.display = 'flex';
}

function updateContact(id) {
  if(!id) id = document.getElementById('ei-id').value;
  const c = state.contacts.find(x=>x.id===id);
  if(!c) return;
  const name = document.getElementById('ei-name').value.trim();
  const date = document.getElementById('ei-date').value;
  if(!name||!date) { alert('Name and date are required'); return; }
  c.name    = name;
  c.phone   = document.getElementById('ei-phone').value.trim();
  c.dueDate = date;
  c.linkedin= document.getElementById('ei-li').value.trim();
  save();
  document.getElementById('editFormOverlay').style.display = 'none';
  closeModal(); render();
}

function deleteContact(id) {
  if(!id) id = document.getElementById('ei-id').value;
  if(!confirm('Remove this contact?')) return;
  state.contacts = state.contacts.filter(x=>x.id!==id);
  save();
  document.getElementById('editFormOverlay').style.display = 'none';
  closeModal(); render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
load(); render();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
